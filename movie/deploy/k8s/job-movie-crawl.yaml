apiVersion: batch/v1
kind: Job
metadata:
  name: movie-crawl
  namespace: crawl
spec:
  completionMode: Indexed
  completions: 3
  parallelism: 3
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: movie-finder
          image: movie-finder:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-config=/config/agents.json"
            - "-proxy-docket="
            - "-workers=8"
            - "-timeout=120s"
            - "-output=/out/result.json"
          env:
            - name: HTTP_PROXY
              value: "http://movie-proxy:8888"
            - name: HTTPS_PROXY
              value: "http://movie-proxy:8888"
          volumeMounts:
            - name: agents
              mountPath: /config
            - name: out
              mountPath: /out
      volumes:
        - name: agents
          configMap:
            name: movie-agents
        - name: out
          emptyDir: {}
