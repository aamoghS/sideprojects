apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-proxy
  namespace: crawl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: movie-proxy
  template:
    metadata:
      labels:
        app: movie-proxy
    spec:
      containers:
        - name: proxy
          image: movie-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: PROXY_ADDR
              value: "0.0.0.0:8888"
            - name: ALLOW_INSECURE
              value: "true"
            - name: PROXY_USER
              valueFrom:
                secretKeyRef:
                  name: movie-proxy-auth
                  key: PROXY_USER
            - name: PROXY_PASS
              valueFrom:
                secretKeyRef:
                  name: movie-proxy-auth
                  key: PROXY_PASS
          readinessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: movie-proxy
  namespace: crawl
spec:
  selector:
    app: movie-proxy
  ports:
    - port: 8888
      targetPort: 8888
