services:
  proxy-server:
    build:
      context: .
      dockerfile: deploy/proxy/Dockerfile
    image: movie-proxy:latest
    ports:
      - "${PROXY_PORT:-8888}:8888"
    environment:
      PROXY_ADDR: 0.0.0.0:8888
      PROXY_USER: ${PROXY_USER:?set PROXY_USER in .env}
      PROXY_PASS: ${PROXY_PASS:?set PROXY_PASS in .env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
